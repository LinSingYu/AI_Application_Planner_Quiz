<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 應用規劃師測驗</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f1f5f9;
        }
        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .option-btn:active:not(:disabled) {
            transform: scale(0.98);
        }
        /* 美化捲動條 */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        .tab-active {
            border-bottom: 3px solid #4f46e5;
            color: #4f46e5;
        }
        .pulse-soft {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .8; }
        }
        .level-card:hover {
            transform: translateY(-5px);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="app" class="bg-white w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden transition-all duration-300 relative border border-gray-100 flex flex-col">
        <!-- 頂部標題列 -->
        <div class="bg-indigo-700 p-5 text-white">
            <div id="header-content" class="flex justify-between items-center px-2">
                <h1 id="main-title" class="text-lg font-bold tracking-wider flex items-center gap-2">
                    AI 應用規劃師測驗系統
                </h1>
                <div id="header-nav"></div>
            </div>
        </div>

        <!-- 視圖容器 -->
        <div id="view-container" class="p-6 md:p-8 min-h-[550px] flex-grow">
            <!-- 內容動態插入 -->
        </div>

        <!-- 底部版權宣告與隱藏開關 -->
        <div class="p-4 text-center bg-gray-50 border-t border-gray-100">
            <span id="secret-trigger" onclick="handleSecretClick()" class="text-[10px] text-gray-300 cursor-pointer select-none hover:text-gray-400 transition-colors">
                Copyright 2026 LIN
            </span>
        </div>

        <!-- 自訂對話框 (Modal) -->
        <div id="custom-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
            <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden fade-in">
                <div class="p-6">
                    <h3 id="modal-title" class="text-lg font-bold text-gray-800 mb-2">確認操作</h3>
                    <p id="modal-content" class="text-gray-600">您確定要執行此操作嗎？</p>
                </div>
                <div class="bg-gray-50 p-4 flex justify-end gap-3">
                    <button id="modal-cancel" class="px-4 py-2 text-gray-600 hover:bg-gray-200 rounded-lg transition font-medium">取消</button>
                    <button id="modal-confirm" class="px-4 py-2 bg-red-500 text-white hover:bg-red-600 rounded-lg transition font-medium">確定執行</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const categories = ["科目一", "科目二", "科目三"];

        // 分級考試日期定義
        const EXAM_DATES = {
            '初級': new Date('2026-05-16'),
            '中級': new Date('2026-05-23')
        };
        
        // 初始狀態
        let state = {
            view: 'levelSelect', // 新增視圖狀態
            currentLevel: '',    // '初級' 或 '中級'
            ccurrentIndex: 0,
            score: 0,
            userAnswers: [],
            sessionQuestions: [],
            manageCategory: categories[0],
            isAnswered: false,
            selectedIdx: null,
            quizLimit: 20,
            clickCount: 0,
            lastClickTime: 0
        };

        // 題庫資料
        let questionBank = [];

        window.onload = async () => {
            try {
                const response = await fetch('questions.json');
                questionBank = await response.json();
            } catch (error) {
                console.error("載入題庫失敗：", error);
                alert("無法載入題庫，請確認 questions.json 檔案是否存在與格式是否正確！");
            }
            renderLevelSelect();
        };

        // 隱藏功能觸發
        function handleSecretClick() {
            const now = Date.now();
            if (now - state.lastClickTime > 1000) state.clickCount = 0;
            state.clickCount++;
            state.lastClickTime = now;
            if (state.clickCount === 3) {
                state.clickCount = 0;
                startHiddenQuiz();
            }
        }

        async function startHiddenQuiz() {
            try {
                const response = await fetch('questions_hidden.json');
                const hiddenQuestionBank = await response.json();
                
                let shuffledPool = shuffleArray([...hiddenQuestionBank]);
                state.sessionQuestions = shuffledPool.map(q => {
                    let meta = q.options.map((t, i) => ({ text: t, isCorrect: i === q.correct }));
                    shuffleArray(meta);
                    return { ...q, options: meta.map(m => m.text), correct: meta.findIndex(m => m.isCorrect) };
                });
                state.currentIndex = 0; state.score = 0; state.userAnswers = []; state.isAnswered = false;
                updateHeader('quiz'); renderQuestion();
            } catch (error) {
                console.error("載入隱藏題庫失敗：", error);
                alert("無法載入隱藏題庫，請確認 questions.json 檔案是否存在與格式是否正確！");
            }
        }


        // 視圖：等級選擇
        function renderLevelSelect() {
            state.view = 'levelSelect';
            state.currentLevel = '';
            updateHeader('levelSelect');
            const container = document.getElementById('view-container');
            container.innerHTML = `
                <div class="fade-in space-y-10 py-10">
                    <div class="text-center space-y-3">
                        <h2 class="text-3xl font-black text-gray-800 tracking-tight">選擇測驗等級</h2>
                        <p class="text-gray-500">請根據您的學習進度選擇合適的挑戰</p>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <button onclick="selectLevel('初級')" class="level-card group relative p-8 bg-white border-2 border-indigo-100 rounded-3xl hover:border-indigo-600 transition-all duration-300 shadow-xl hover:shadow-indigo-100">
                            <div class="absolute top-4 right-4 text-indigo-100 group-hover:text-indigo-600 transition-colors">
                                <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" /></svg>
                            </div>
                            <div class="space-y-4 text-left">
                                <span class="bg-indigo-100 text-indigo-600 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest">Foundation</span>
                                <h3 class="text-2xl font-bold text-gray-800">初級測驗</h3>
                                <p class="text-sm text-gray-500 leading-relaxed">除非我沒考過，不然不想維護了(ノ▼Д▼)ノ</p>
                            </div>
                        </button>

                        <button onclick="selectLevel('中級')" class="level-card group relative p-8 bg-white border-2 border-indigo-100 rounded-3xl hover:border-indigo-600 transition-all duration-300 shadow-xl hover:shadow-indigo-100">
                            <div class="absolute top-4 right-4 text-indigo-100 group-hover:text-indigo-600 transition-colors">
                                <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L1 12h3v9h6v-6h4v6h6v-9h3L12 2z"/></svg>
                            </div>
                            <div class="space-y-4 text-left">
                                <span class="bg-indigo-600 text-white px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest">Professional</span>
                                <h3 class="text-2xl font-bold text-gray-800">中級測驗</h3>
                                <p class="text-sm text-gray-500 leading-relaxed">要是我初級過了就會來維護(◔౪◔)</p>
                            </div>
                        </button>
                    </div>
                </div>
            `;
        }

        function selectLevel(level) {
            state.currentLevel = level;
            renderHome();
        }

        function updateHeader(view) {
            const nav = document.getElementById('header-nav');
            const title = document.getElementById('main-title');
            
            if (view === 'levelSelect') {
                title.innerText = "測驗等級選擇";
                nav.innerHTML = `<button onclick="renderManage()" class="text-xs bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-lg border border-white/20 transition">管理</button>`;
            } else if (view === 'quiz') {
                title.innerText = `${state.currentLevel}測驗中`;
                nav.innerHTML = `<button onclick="confirmExit()" class="text-xs bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-lg border border-white/20 transition">退出</button>`;
            } else if (view === 'manage') {
                title.innerText = "題庫管理";
                nav.innerHTML = `<button onclick="renderLevelSelect()" class="text-xs bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-lg border border-white/20 transition tracking-tighter">回主畫面</button>`;
            } else {
                title.innerText = `${state.currentLevel}測驗主選單`;
                nav.innerHTML = `<button onclick="renderLevelSelect()" class="text-xs bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-lg border border-white/20 transition">切換等級</button>`;
            }
        }

        // --- 視圖：首頁 (科目選擇) ---
        function renderHome() {
            state.view = 'home';
            updateHeader('home');
            const container = document.getElementById('view-container');
            const daysLeft = getDaysRemaining();
            const examDateStr = EXAM_DATES[state.currentLevel].toLocaleDateString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit' });

            // 根據等級過濾科目：初級一二，中級一二三
            const currentLevelCategories = state.currentLevel === '中級' ? categories : ["科目一", "科目二"];

            container.innerHTML = `
                <div class="fade-in space-y-6">
                    <!-- 考試倒數橫幅 (動態切換日期) -->
                    <div class="p-4 bg-gradient-to-r from-amber-50 to-orange-50 border border-amber-200 rounded-2xl flex items-center justify-between shadow-sm pulse-soft">
                        <div class="flex items-center gap-3">
                            <div class="bg-amber-100 p-2 rounded-lg text-amber-600">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2-2v12a2 2 0 002 2z" /></svg>
                            </div>
                            <div>
                                <p class="text-sm font-bold text-amber-800">${state.currentLevel} 考試倒數：${examDateStr}</p>
                                <p class="text-[10px] text-amber-600 font-bold uppercase tracking-widest">AI Application Planner</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <span class="text-2xl font-black text-amber-700">${daysLeft}</span>
                            <span class="text-xs font-bold text-amber-600 ml-0.5">DAYS</span>
                        </div>
                    </div>

                    <!-- 題數設定 -->
                    <div class="bg-indigo-50 p-5 rounded-2xl border border-indigo-100 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                        <span class="font-bold text-indigo-800 text-sm italic">練習題數：</span>
                        <select onchange="handleLimitChange(this.value)" class="bg-white border-2 border-indigo-200 rounded-xl px-4 py-2 outline-none focus:border-indigo-500 font-bold text-indigo-600 transition cursor-pointer">
                            <option value="10" ${state.quizLimit === 10 ? 'selected' : ''}>10 題</option>
                            <option value="20" ${state.quizLimit === 20 ? 'selected' : ''}>20 題</option>
                            <option value="30" ${state.quizLimit === 30 ? 'selected' : ''}>30 題</option>
                            <option value="40" ${state.quizLimit === 40 ? 'selected' : ''}>40 題</option>
                            <option value="50" ${state.quizLimit === 50 ? 'selected' : ''}>50 題</option>
                        </select>
                    </div>

                    <!-- 科目選擇 (分級過濾) -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 pt-4">
                        ${currentLevelCategories.map(cat => {
                            const count = questionBank.filter(q => q.category === cat && q.level === state.currentLevel).length;
                            return `
                                <button onclick="startQuiz('${cat}')" class="p-6 bg-white border-2 border-gray-100 rounded-2xl hover:border-indigo-600 transition-all text-left group shadow-md">
                                    <div class="flex justify-between items-center mb-1">
                                        <span class="text-indigo-600 font-bold">${cat}</span>
                                        <span class="text-[10px] bg-indigo-100 text-indigo-600 px-2 py-0.5 rounded-full font-bold">庫存 ${count} 題</span>
                                    </div>
                                    <p class="text-xs text-gray-400">進入「${state.currentLevel}」之${cat}練習</p>
                                </button>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        }

         // --- 測驗邏輯 ---
        function startQuiz(category) {
            const pool = questionBank.filter(q => q.category === category && q.level === state.currentLevel);
            if (pool.length === 0) return alert(`「${state.currentLevel}」的「${category}」目前尚無題目。`);

            let shuffledPool = shuffleArray([...pool]).slice(0, state.quizLimit);
            state.sessionQuestions = shuffledPool.map(q => {
                let meta = q.options.map((t, i) => ({ text: t, isCorrect: i === q.correct }));
                shuffleArray(meta);
                return { ...q, options: meta.map(m => m.text), correct: meta.findIndex(m => m.isCorrect) };
            });

            state.currentIndex = 0; state.score = 0; state.userAnswers = []; state.isAnswered = false;
            updateHeader('quiz'); renderQuestion();
        }

        function renderQuestion() {
            const container = document.getElementById('view-container');
            const q = state.sessionQuestions[state.currentIndex];
            const progress = ((state.currentIndex + 1) / state.sessionQuestions.length) * 100;

            container.innerHTML = `
                <div class="fade-in space-y-6">
                    <div class="flex justify-between items-end">
                        <div>
                            <span class="text-[10px] font-bold text-indigo-500 uppercase tracking-widest bg-indigo-50 px-2 py-0.5 rounded">${q.level} | ${q.category}</span>
                            <h2 class="text-xl font-bold text-gray-800 mt-2">第 ${state.currentIndex + 1} 題 / 共 ${state.sessionQuestions.length} 題</h2>
                        </div>
                    </div>
                    
                    <div class="w-full bg-gray-100 h-1.5 rounded-full overflow-hidden shadow-inner">
                        <div class="bg-indigo-600 h-full transition-all duration-500" style="width: ${progress}%"></div>
                    </div>

                    <p class="text-lg font-medium text-gray-700 leading-relaxed min-h-[60px]">${q.question}</p>

                    <div class="grid grid-cols-1 gap-3">
                        ${q.options.map((opt, i) => {
                            let btnClass = "border-gray-100 bg-white hover:border-indigo-500 hover:bg-indigo-50";
                            let icon = `<span class="w-10 h-10 rounded-xl bg-gray-50 text-gray-400 flex items-center justify-center mr-4 font-black">${String.fromCharCode(65 + i)}</span>`;
                            if (state.isAnswered) {
                                if (i === q.correct) {
                                    btnClass = "border-green-500 bg-green-50 shadow-none";
                                    icon = `<span class="w-10 h-10 rounded-xl bg-green-500 text-white flex items-center justify-center mr-4"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></span>`;
                                } else if (i === state.selectedIdx) {
                                    btnClass = "border-red-500 bg-red-50 shadow-none";
                                    icon = `<span class="w-10 h-10 rounded-xl bg-red-500 text-white flex items-center justify-center mr-4"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg></span>`;
                                } else {
                                    btnClass = "border-gray-100 bg-gray-50 opacity-60";
                                }
                            }
                            return `<button onclick="handleAnswer(${i})" ${state.isAnswered ? 'disabled' : ''} class="option-btn group text-left p-4 border-2 rounded-2xl transition-all flex items-center ${btnClass} shadow-sm">${icon}<span class="text-gray-700 font-medium">${opt}</span></button>`;
                        }).join('')}
                    </div>

                    <div id="feedback" class="${state.isAnswered ? 'block' : 'hidden'} fade-in space-y-4 pt-2">
                        <div class="p-4 bg-indigo-50 rounded-2xl border border-indigo-100 text-sm shadow-sm">
                            <h4 class="font-bold text-indigo-700 mb-1 italic tracking-tight">題目解析：</h4>
                            <p class="text-gray-700 leading-relaxed">${q.explanation}</p>
                        </div>
                        <button onclick="nextQuestion()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold hover:bg-indigo-700 transition flex items-center justify-center gap-2 shadow-lg shadow-indigo-100">
                            ${state.currentIndex < state.sessionQuestions.length - 1 ? '下一題' : '查看成績'}
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </button>
                    </div>
                </div>
            `;
        }

        function handleAnswer(idx) {
            if (state.isAnswered) return;
            state.isAnswered = true; state.selectedIdx = idx; state.userAnswers.push(idx);
            if (idx === state.sessionQuestions[state.currentIndex].correct) state.score++;
            renderQuestion();
        }

        function nextQuestion() {
            if (state.currentIndex < state.sessionQuestions.length - 1) {
                state.currentIndex++; state.isAnswered = false; state.selectedIdx = null; renderQuestion();
            } else {
                renderResult();
            }
        }

        function renderResult() {
            updateHeader('home');
            const total = state.sessionQuestions.length;
            const score = Math.round((state.score / total) * 100);
            document.getElementById('view-container').innerHTML = `
                <div class="fade-in space-y-8 py-6 text-center">
                    <p class="text-gray-400 font-bold uppercase tracking-widest text-xs">Final Score</p>
                    <h2 class="text-8xl font-black text-indigo-600">${score}</h2>
                    <p class="text-gray-500 font-medium">答對 ${state.score} 題 / 本次共 ${total} 題</p>
                    <button onclick="renderHome()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold hover:bg-indigo-700 transition shadow-lg shadow-indigo-100">回到選單</button>
                </div>
            `;
        }

        function confirmExit() {
            const modal = document.getElementById('custom-modal');
            document.getElementById('modal-title').innerText = "退出測驗";
            document.getElementById('modal-content').innerText = "確定要中斷測驗嗎？進度將會遺失。";
            const confirmBtn = document.getElementById('modal-confirm');
            modal.classList.remove('hidden');
            document.getElementById('modal-cancel').onclick = () => modal.classList.add('hidden');
            confirmBtn.onclick = () => { modal.classList.add('hidden'); renderHome(); };
        }

        // --- 管理功能 ---
        function renderManage() {
            updateHeader('manage');
            const container = document.getElementById('view-container');
            const filteredQuestions = questionBank.filter(q => q.category === state.manageCategory);
            container.innerHTML = `
                <div class="fade-in space-y-6">
                    <div class="flex border-b">
                        ${categories.map(cat => `<button onclick="switchManageTab('${cat}')" class="flex-1 py-3 text-sm font-bold ${state.manageCategory === cat ? 'tab-active' : 'text-gray-400'}">${cat}</button>`).join('')}
                    </div>
                    <div class="bg-gray-50 p-5 rounded-2xl border text-sm space-y-3 shadow-inner">
                        <select id="new-q-level" class="w-full p-2 border rounded outline-none focus:ring-1 focus:ring-indigo-500 transition">
                            <option value="初級">初級題目</option>
                            <option value="中級">中級題目</option>
                        </select>
                        <input id="new-q-text" type="text" placeholder="題目內容" class="w-full p-2 border rounded outline-none focus:ring-1 focus:ring-indigo-500 transition">
                        <div class="grid grid-cols-2 gap-2">
                            <input id="opt-0" type="text" placeholder="A" class="p-2 border rounded">
                            <input id="opt-1" type="text" placeholder="B" class="p-2 border rounded">
                            <input id="opt-2" type="text" placeholder="C" class="p-2 border rounded">
                            <input id="opt-3" type="text" placeholder="D" class="p-2 border rounded">
                        </div>
                        <select id="correct-idx" class="w-full p-2 border rounded text-xs bg-white outline-none"><option value="0">正確答案：A</option><option value="1">正確答案：B</option><option value="2">正確答案：C</option><option value="3">正確答案：D</option></select>
                        <button onclick="addQuestion()" class="w-full bg-green-600 text-white py-2 rounded-xl font-bold shadow-md hover:bg-green-700 transition">加入題庫</button>
                    </div>
                    <div class="max-h-[250px] overflow-y-auto space-y-2 pr-1 text-xs">
                        ${filteredQuestions.map((q, idx) => `<div class="p-3 bg-white border rounded-xl flex justify-between items-center shadow-sm"><p class="font-bold text-gray-800 flex-1 leading-relaxed">${q.level} - ${q.question}</p><button onclick="deleteQuestion(${questionBank.indexOf(q)})" class="text-red-500 ml-2 font-bold p-1 hover:bg-red-50 rounded">刪除</button></div>`).join('')}
                    </div>
                </div>
            `;
        }

        function switchManageTab(cat) { state.manageCategory = cat; renderManage(); }
        function addQuestion() {
            const q = document.getElementById('new-q-text').value.trim();
            const level = document.getElementById('new-q-level').value;
            const opts = [document.getElementById('opt-0').value, document.getElementById('opt-1').value, document.getElementById('opt-2').value, document.getElementById('opt-3').value];
            if (!q || opts.some(o => !o)) return alert('請完整填寫');
            questionBank.push({ level, category: state.manageCategory, question: q, options: opts, correct: parseInt(document.getElementById('correct-idx').value), explanation: "無解析。" });
            renderManage();
        }
        function deleteQuestion(idx) { questionBank.splice(idx, 1); renderManage(); }

        // 其他工具
        function handleLimitChange(val) { state.quizLimit = parseInt(val); }
        function getDaysRemaining() { 
            const targetDate = EXAM_DATES[state.currentLevel] || new Date();
            const diff = targetDate - new Date(); 
            return Math.max(0, Math.ceil(diff / (1000*60*60*24))); 
        }
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }
    </script>
